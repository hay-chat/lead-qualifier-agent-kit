<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        width: 340px;
        padding: 18px;
        background: #fafafa;
        color: #1a1a2e;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid #e5e5e5;
      }
      .header h1 { font-size: 15px; font-weight: 700; color: #2563eb; }
      .logo {
        width: 28px; height: 28px; background: #2563eb; border-radius: 6px;
        display: flex; align-items: center; justify-content: center;
        color: white; font-weight: 700; font-size: 14px;
      }
      label {
        display: block; font-size: 12px; font-weight: 600;
        color: #555; margin-bottom: 4px; margin-top: 12px;
      }
      label:first-of-type { margin-top: 0; }
      input {
        width: 100%; padding: 8px 10px; border: 1px solid #ddd;
        border-radius: 6px; font-size: 13px; outline: none;
      }
      input:focus { border-color: #2563eb; }
      .btn {
        width: 100%; margin-top: 16px; padding: 10px;
        background: #2563eb; color: white; border: none;
        border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer;
      }
      .btn:hover { background: #1d4ed8; }
      .btn.secondary { background: #e5e7eb; color: #1a1a2e; margin-top: 8px; }
      .btn.secondary:hover { background: #d1d5db; }
      .status {
        margin-top: 10px; font-size: 12px; text-align: center;
        color: #22c55e; display: none;
      }
      .field-hint { margin-top: 4px; font-size: 11px; color: #999; }
      .hint { margin-top: 12px; font-size: 11px; color: #888; text-align: center; line-height: 1.4; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">I</div>
      <h1>Lead Qualifier</h1>
    </div>

    <label for="daemonUrl">Daemon URL</label>
    <input type="url" id="daemonUrl" placeholder="http://localhost:7823" />
    <p class="field-hint">Printed in the terminal when you run <code>npm start</code>.</p>

    <label for="daemonPassword">Password</label>
    <input type="password" id="daemonPassword" placeholder="••••••••" />

    <button class="btn" id="saveBtn">Save</button>
    <button class="btn secondary" id="syncBtn">Sync now</button>
    <div class="status" id="status">Saved</div>

    <p class="hint">Cookies sync to your local daemon hourly<br/>and any time you log into LinkedIn.</p>

    <script src="popup.js"></script>
  </body>
</html>
